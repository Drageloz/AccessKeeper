<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Access Keeper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- OTP overlay — shown when a PAM site requires a one-time password -->
  <div class="otp-overlay" id="otpOverlay">
    <div class="otp-modal">
      <p class="otp-title">One-Time Password required</p>
      <p class="otp-subtitle" id="otpSiteName"></p>
      <input type="text" id="otpInput" class="cred-input otp-input"
             placeholder="Enter OTP code" maxlength="8"
             autocomplete="one-time-code" inputmode="numeric">
      <div class="otp-actions">
        <button id="otpCancelBtn" class="btn btn-secondary btn-sm">Cancel</button>
        <button id="otpSubmitBtn" class="btn btn-primary btn-sm">Submit</button>
      </div>
    </div>
  </div>

  <div class="header">
    <div class="header-title">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <h1>Access Keeper</h1>
    </div>
    <button id="checkAllBtn" class="btn btn-primary">Check All</button>
  </div>

  <div id="siteList" class="site-list">
    <div class="loading">Loading...</div>
  </div>

  <div class="credentials-section">
    <div class="credentials-header" id="credentialsToggle">
      <svg class="cred-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M20 21a8 8 0 1 0-16 0"/>
      </svg>
      <span class="cred-title">My credentials</span>
      <span id="credStatus" class="cred-status cred-not-set">Not configured</span>
      <svg class="chevron" id="chevronIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="credentials-body" id="credentialsBody">
      <input type="text" id="credUsername" class="cred-input" placeholder="Username" autocomplete="off" spellcheck="false">
      <input type="password" id="credPassword" class="cred-input" placeholder="Password" autocomplete="new-password">
      <div class="cred-actions">
        <button id="clearCredBtn" class="btn btn-secondary btn-sm">Clear</button>
        <button id="saveCredBtn" class="btn btn-primary btn-sm">Save to session</button>
      </div>
      <p class="cred-note">Saved locally on this device · Encrypted by Chrome</p>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">Auto-check twice a month</span>
  </div>

  <script src="sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
