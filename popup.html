<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Access Keeper</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="header">
    <div class="header-title">
      <svg class="header-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
      </svg>
      <h1>Access Keeper</h1>
    </div>
    <button id="checkAllBtn" class="btn btn-primary">Verificar Todo</button>
  </div>

  <div id="siteList" class="site-list">
    <div class="loading">Cargando...</div>
  </div>

  <div class="credentials-section">
    <div class="credentials-header" id="credentialsToggle">
      <svg class="cred-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <circle cx="12" cy="8" r="4"/>
        <path d="M20 21a8 8 0 1 0-16 0"/>
      </svg>
      <span class="cred-title">Mis credenciales</span>
      <span id="credStatus" class="cred-status cred-not-set">No configurado</span>
      <svg class="chevron" id="chevronIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
    </div>
    <div class="credentials-body" id="credentialsBody">
      <input type="text" id="credUsername" class="cred-input" placeholder="Usuario" autocomplete="off" spellcheck="false">
      <input type="password" id="credPassword" class="cred-input" placeholder="Contraseña" autocomplete="new-password">
      <div class="cred-actions">
        <button id="clearCredBtn" class="btn btn-secondary btn-sm">Borrar</button>
        <button id="saveCredBtn" class="btn btn-primary btn-sm">Guardar en sesión</button>
      </div>
      <p class="cred-note">Solo en memoria · Se borra al cerrar Chrome</p>
    </div>
  </div>

  <div class="footer">
    <span class="footer-text">Auto-verificación cada 4 horas</span>
  </div>

  <script src="sites.js"></script>
  <script src="popup.js"></script>
</body>
</html>
